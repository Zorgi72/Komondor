name: kodus-e2e-pr
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/kodus-e2e-pr.yml'
permissions:
  contents: write
  pull-requests: write
jobs:
  open:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: create branch file and PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -eux
          BRANCH="kodus-e2e-bot-${GITHUB_RUN_ID}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          mkdir -p src
          cat > src/insecure_app.py <<'PY'
          # Intentionally insecure sample for Kodus E2E automated review
          import os
          import subprocess
          API_KEY = "sk-live-hardcoded-secret-do-not-use-in-prod-xyz"
          def run_cmd(user_input: str) -> str:
              os.system("echo " + user_input)
              return subprocess.getoutput("ls " + user_input)
          def divide(a: int, b: int) -> float:
              return a / b
          def check_password(password: str) -> bool:
              expected = os.environ.get("PASSWORD", "admin")
              return password == expected
          if __name__ == "__main__":
              print(divide(1, 0))
          PY
          # strip leading spaces from cat indent
          sed -i 's/^          //' src/insecure_app.py
          git add src/insecure_app.py
          git commit -m "e2e: insecure sample for Kodus REQUEST_CHANGES"
          git push origin "$BRANCH"
          gh pr create --repo "${{ github.repository }}" \
            --title "Kodus E2E bot-authored PR for REQUEST_CHANGES" \
            --body "Bot-authored E2E PR for Kodus on 0xpid00/Komondor." \
            --base main --head "$BRANCH"
