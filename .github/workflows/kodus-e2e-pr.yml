# Open an intentionally insecure sample PR for Kodus self-host E2E review.
#
# GITHUB_TOKEN cannot create PRs unless the repo allows it
# (Settings → Actions → General → "Allow GitHub Actions to create and approve
# pull requests"). Prefer secrets.KODUS_GRANT_TOKEN / GH_PAT with repo scope.
name: kodus-e2e-pr
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/kodus-e2e-pr.yml'

permissions:
  contents: write
  pull-requests: write

jobs:
  open:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.KODUS_GRANT_TOKEN || secrets.GH_PAT || github.token }}
      - name: create branch file and PR
        env:
          GH_TOKEN: ${{ secrets.KODUS_GRANT_TOKEN || secrets.GH_PAT || github.token }}
        run: |
          set -eux
          BRANCH="kodus-e2e-bot-${GITHUB_RUN_ID}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          mkdir -p src
          cat > src/insecure_app.py <<'PY'
          # Intentionally insecure sample for Kodus E2E automated review
          import os
          import subprocess
          API_KEY = "sk-live-hardcoded-secret-do-not-use-in-prod-xyz"
          def run_cmd(user_input: str) -> str:
              os.system("echo " + user_input)
              return subprocess.getoutput("ls " + user_input)
          def divide(a: int, b: int) -> float:
              return a / b
          def check_password(password: str) -> bool:
              expected = os.environ.get("PASSWORD", "admin")
              return password == expected
          if __name__ == "__main__":
              print(divide(1, 0))
          PY
          sed -i 's/^          //' src/insecure_app.py
          git add src/insecure_app.py
          git commit -m "e2e: insecure sample for Kodus REQUEST_CHANGES"
          git push origin "$BRANCH"
          # Prefer REST create if GraphQL is blocked for Actions bot
          if ! gh pr create --repo "${{ github.repository }}" \
              --title "Kodus E2E bot-authored PR for REQUEST_CHANGES" \
              --body "Bot-authored E2E PR for Kodus on 0xpid00/Komondor. Comment \`@kody start-review\` if auto-review does not fire." \
              --base main --head "$BRANCH"; then
            echo "gh pr create failed — attempting REST API"
            curl -fsS -X POST \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${{ github.repository }}/pulls" \
              -d "{\"title\":\"Kodus E2E bot-authored PR for REQUEST_CHANGES\",\"head\":\"${BRANCH}\",\"base\":\"main\",\"body\":\"Bot-authored E2E PR for Kodus.\"}"
          fi
