name: open-e2e-pr
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/open-e2e-pr.yml'
permissions:
  contents: write
  pull-requests: write
jobs:
  open:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: seed branch and open PR as bot
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B e2e-bot-review
          mkdir -p src
          python3 - <<'PY'
          open("src/vuln.py","w").write("""# intentional insecure sample for review policy e2e
          import os
          SECRET = "sk-live-hardcoded-bot-pr"
          def run(cmd):
              return os.system(cmd)
          def div(a,b):
              return a/b
          if __name__ == "__main__":
              print(div(1,0))
          """)
          PY
          git add src/vuln.py
          git commit -m "e2e: insecure sample for non-self review" || true
          git push -f origin e2e-bot-review
          # open PR if missing
          if ! gh pr list --head e2e-bot-review --json number --jq 'length' | grep -vq '^0$'; then
            gh pr create --base main --head e2e-bot-review \
              --title "E2E bot-authored PR for Kodus REQUEST_CHANGES" \
              --body $'Opened by github-actions[bot] so Zorgi72/Kodus can request changes.\n\n@kody start-review'
          fi
          gh pr list --head e2e-bot-review
